name: Generate Languages used 

on:
  push:
    branches: [testing]
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write  
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq golang git fonts-terminus fonts-inconsolata fonts-dejavu

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tokei via Cargo
        run: cargo install tokei

      - name: Install freeze
        run: |
          export GOPATH=$HOME/go
          export PATH=$PATH:$GOPATH/bin

          go install github.com/charmbracelet/freeze@latest

      - name: Generate Stats and Screenshot
        shell: bash
        run: |
          # Move to the workspace root
          cd "$GITHUB_WORKSPACE"
          
          export GOPATH=$HOME/go
          export PATH=$PATH:$GOPATH/bin
          
          # Install freeze binary
          go install github.com/charmbracelet/freeze@latest
          
          mkdir -p Documentation/stats

          # Pipe tokei output into freeze
          tokei | freeze --language text \
            --theme "dracula" \
            --shadow.blur 20 \
            --padding 20 \
            --output Documentation/stats/stats.png

      - name: Commit & Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: Updated languages used stat."
          file_pattern: 'Documentation/stats/stats.png'
          commit_user_name: tokei-lang[bot]
          commit_user_email: tokei-lang@coder.is-a.dev
          commit_author: Tokei <tokei-lang@coder.is-a.dev>
