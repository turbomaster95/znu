name: Generate Languages used 

on:
  push:
    branches: [testing]
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    container: 
      image: alpine:latest
    permissions:
      contents: write  
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true

      - name: Install Dependencies
        shell: sh
        run: |
          apk add --no-cache --update \
            tokei \
            jq \
            go \
            git \
            build-base \
            bash \
            gcompat \
            font-terminus \
            font-inconsolata \
            font-dejavu \
            font-noto

      - name: Generate Stats and Screenshot
        shell: bash
        run: |
          export GOPATH=$HOME/go
          export PATH=$PATH:$GOPATH/bin
          
          # Install freeze binary
          go install github.com/charmbracelet/freeze@latest
          
          mkdir -p Documentation/stats

          # Pipe tokei output into freeze with explicit language handling
          tokei | freeze --language text \
            --theme "dracula" \
            --shadow.blur 20 \
            --padding 20 \
            --output Documentation/stats/stats.png

      - name: Configure Git
        shell: sh
        run: |
          git config --global user.name "tokei-lang[bot]"
          git config --global user.email "tokei-lang@coder.is-a.dev"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
      
      - name: Commit & Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: Updated languages used stat."
          file_pattern: 'Documentation/stats/stats.png'
          commit_user_name: tokei-lang[bot]
          commit_user_email: tokei-lang@coder.is-a.dev
          commit_author: Tokei <tokei-lang@coder.is-a.dev>
          repository: ${{ github.workspace }}
