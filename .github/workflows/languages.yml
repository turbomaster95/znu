name: Generate Languages used 

on:
  push:
    branches: [testing]
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    container: 
      image: alpine:latest
    permissions:
      contents: write  
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Install Dependencies
        shell: sh
        run: |
          apk add --no-cache --update \
            tokei \
            jq \
            go \
            git \
            build-base \
            bash \
            font-terminus \
            font-inconsolata \
            font-dejavu \
            font-noto

      - name: Generate Stats and Screenshot
        shell: bash
        run: |
          export GOPATH=$HOME/go
          export PATH=$PATH:$GOPATH/bin
          
          # Install freeze
          go install github.com/charmbracelet/freeze@latest
          
          mkdir -p Documentation/stats

          # We use bash -c to ensure the environment is ready for freeze
          tokei | freeze --language text \
            --theme "dracula" \
            --shadow.blur 20 \
            --padding 20 \
            --output Documentation/stats/stats.png

      - name: Configure Git
        run: |
          git config --global user.name "tokei-lang[bot]"
          git config --global user.email "tokei-lang@coder.is-a.dev"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
      
      - name: Commit & Push changes
        shell: bash
	uses: stefanzweifel/git-auto-commit-action@v7
	with:
	      repository: ${{ github.workspace }}
	      commit_message: "docs: Updated languages used stat."
	      file_pattern: 'Documentation/stats/stats.png'
	      commit_user_name: tokei-lang[bot]
	      commit_user_email: tokei-lang@coder.is-a.dev
	      commit_author: Tokei <tokei-lang@coder.is-a.dev>
